<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title }} | Advocate</title>
    <link rel="stylesheet" href="/static/core/app.css" />
    {% block head_extra %}{% endblock %}
  </head>
  <body>
    <header class="topbar">
      <div class="brand"><a href="/dashboard">Advocate</a></div>
      {% if session.get('authenticated') %}
      <nav class="nav-links">
        <a href="/dashboard">Dashboard</a>
        <a href="/zlink/dashboard">ZLink</a>
        <a href="/files/ui">Files</a>
        <a href="/terminal/ui">Terminal</a>
        <a href="/ftp/ui">FTP</a>
        <a href="/gemini/ui">Gemini</a>
      </nav>
      <form method="post" action="/logout" class="logout-form">
        <button type="submit">Logout</button>
      </form>
      {% endif %}
    </header>

    <main class="container">
      {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
  </body>
</html>
